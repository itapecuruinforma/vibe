name: 🤖 Bot — Curiosidades

on:
  schedule:
    # Todo dia às 12:00 UTC = 9:00 horário de Brasília
    - cron: '0 12 * * *'
  # Permite rodar manualmente pelo GitHub (útil para testar)
  workflow_dispatch:

jobs:
  postar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar bot de curiosidades
        run: node bot/curiosidades.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          BOT_EMAIL: ${{ secrets.BOT_EMAIL }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
