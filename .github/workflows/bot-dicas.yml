name: 🤖 Bot — Dicas Diárias

on:
  schedule:
    # Todo dia às 12:30 UTC = 9:30 horário de Brasília (30 min após curiosidades)
    - cron: '30 12 * * *'
  # Permite rodar manualmente pelo GitHub (útil para testar)
  workflow_dispatch:

jobs:
  postar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar bot de dicas
        run: node bot/dicas.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          BOT_DICAS_EMAIL: ${{ secrets.BOT_DICAS_EMAIL }}
          BOT_DICAS_PASSWORD: ${{ secrets.BOT_DICAS_PASSWORD }}
