name: 🤖 Bot — Fotos

on:
  schedule:
    # Todo dia às 21:00 UTC = 18:00 horário de Brasília
    - cron: '0 21 * * *'
  # Permite rodar manualmente pelo GitHub (útil para testar)
  workflow_dispatch:

jobs:
  postar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar bot de fotos
        run: node bot/fotos.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          BOT_FOTOS_EMAIL: ${{ secrets.BOT_FOTOS_EMAIL }}
          BOT_FOTOS_PASSWORD: ${{ secrets.BOT_FOTOS_PASSWORD }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
