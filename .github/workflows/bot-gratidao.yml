name: 🤖 Bot — Gratidão

on:
  schedule:
    # Todo dia às 16:00 UTC = 13:00 horário de Brasília (30 min após desafios)
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  postar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar bot de gratidão
        run: node bot/gratidao.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          BOT_GRATIDAO_EMAIL: ${{ secrets.BOT_GRATIDAO_EMAIL }}
          BOT_GRATIDAO_PASSWORD: ${{ secrets.BOT_GRATIDAO_PASSWORD }}
