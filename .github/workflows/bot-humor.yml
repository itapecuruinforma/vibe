name: 🤖 Bot — Humor

on:
  schedule:
    # Todo dia às 16:30 UTC = 13:30 horário de Brasília (30 min após gratidão)
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  postar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar bot de humor
        run: node bot/humor.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          BOT_HUMOR_EMAIL: ${{ secrets.BOT_HUMOR_EMAIL }}
          BOT_HUMOR_PASSWORD: ${{ secrets.BOT_HUMOR_PASSWORD }}
