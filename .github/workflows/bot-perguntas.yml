name: 🤖 Bot — Perguntas

on:
  schedule:
    # Todo dia às 14:00 UTC = 11:00 horário de Brasília (30 min após motivação)
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  postar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar bot de perguntas
        run: node bot/perguntas.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          BOT_PERGUNTAS_EMAIL: ${{ secrets.BOT_PERGUNTAS_EMAIL }}
          BOT_PERGUNTAS_PASSWORD: ${{ secrets.BOT_PERGUNTAS_PASSWORD }}
