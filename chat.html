<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chat — Vibe</title>
  <link rel="stylesheet" href="css/global.css"/>
  <style>
    .chat-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }
    .chat-header {
      position: sticky;
      top: 0;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 50;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-input-bar {
      padding: 10px 12px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }
    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }
    .bubble-mine {
      background: linear-gradient(135deg, var(--accent), #9c7cff);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble-other {
      background: var(--bg3);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .bubble-name {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 3px;
      opacity: 0.7;
    }
    .bubble-time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 3px;
      text-align: right;
    }
    .bubble img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      cursor: pointer;
    }
    .bubble audio {
      width: 200px;
      border-radius: 8px;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--text2);
      transition: color 0.2s;
    }
    .icon-btn:hover { color: var(--text); }
    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #9c7cff);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- IMAGE MODAL -->
<div id="imgModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999;align-items:center;justify-content:center">
  <img id="imgModalSrc" style="max-width:95%;max-height:90vh;border-radius:12px"/>
  <button onclick="document.getElementById('imgModal').style.display='none'" style="position:fixed;top:16px;right:16px;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:28px;border-radius:50%;width:40px;height:40px;cursor:pointer">×</button>
</div>

<!-- AUDIO MODAL -->
<div id="audioModal" class="modal-backdrop hidden">
  <div class="modal-box" style="text-align:center">
    <h3 style="font-family:'Syne',sans-serif;margin-bottom:16px">Gravação de áudio</h3>
    <div id="recordStatus" style="color:var(--accent2);font-weight:600;margin-bottom:12px">● Gravando...</div>
    <audio id="audioPreview" controls style="width:100%;margin-bottom:12px;display:none"></audio>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-outline" id="btnStopRec">⏹ Parar</button>
      <button class="btn btn-primary hidden" id="btnSendAudio">Enviar</button>
      <button class="btn btn-danger" id="btnCancelAudio">Cancelar</button>
    </div>
  </div>
</div>

<!-- IMG PREVIEW MODAL -->
<div id="imgPreviewModal" class="modal-backdrop hidden">
  <div class="modal-box" style="text-align:center">
    <h3 style="font-family:'Syne',sans-serif;margin-bottom:12px">Enviar imagem?</h3>
    <img id="imgPreviewSrc" style="max-width:100%;border-radius:12px;margin-bottom:16px"/>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" id="btnCancelImg" style="flex:1">Cancelar</button>
      <button class="btn btn-primary" id="btnConfirmImg" style="flex:1">Enviar</button>
    </div>
  </div>
</div>

<div class="chat-wrap">
  <div class="chat-header">
    <button class="icon-btn" onclick="history.back()">←</button>
    <div id="chatAvatar"></div>
    <div style="flex:1">
      <div id="chatName" style="font-weight:700;font-size:15px;font-family:'Syne',sans-serif"></div>
      <div id="chatSub" style="font-size:12px;color:var(--text3)"></div>
    </div>
    <button class="icon-btn" id="btnGroupManage" style="display:none">⚙️</button>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-input-bar">
    <button class="icon-btn" id="btnRecord">🎤</button>
    <button class="icon-btn" id="btnSendImg">🖼️</button>
    <input type="file" id="imgFileInput" accept="image/*" style="display:none"/>
    <input class="input" id="msgInput" placeholder="Mensagem..." style="flex:1;border-radius:50px;padding:10px 16px"/>
    <button class="send-btn" id="btnSend">→</button>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import {
  getDatabase, ref, get, push, set, onValue, remove, update
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
import { uploadFile, uniquePath } from "./js/storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUWwDL8FOiHl_MMssGwkimoI-i-7C7Rrg",
  authDomain: "controle-de-gasto-fc4e0.firebaseapp.com",
  projectId: "controle-de-gasto-fc4e0",
  storageBucket: "controle-de-gasto-fc4e0.appspot.com",
  messagingSenderId: "1035761573543",
  appId: "1:1035761573543:web:1af30d370cd4815bd14582",
  databaseURL: "https://controle-de-gasto-fc4e0-default-rtdb.firebaseio.com"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const params = new URLSearchParams(location.search);
const tipo = params.get('tipo');
const outroUid = params.get('outroUid');
const paramConvId = params.get('conversaId');

let currentUser = null;
let conversaId = null;
let participantes = {};
const userCache = {};

function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function timeStr(ts) {
  return new Date(ts).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

async function getUser(uid) {
  if (userCache[uid]) return userCache[uid];
  const snap = await get(ref(db, 'usuarios/' + uid));
  userCache[uid] = snap.val() || { username: 'usuário', emoji: '👤' };
  return userCache[uid];
}

onAuthStateChanged(auth, async user => {
  if (!user) return window.location.href = 'index.html';
  currentUser = user;

  if (tipo === 'privado' && outroUid) {
    conversaId = [user.uid, outroUid].sort().join('_');
    const u = await getUser(outroUid);
    document.getElementById('chatName').textContent = `${u.emoji} ${u.username}`;
    document.getElementById('chatSub').textContent = 'conversa privada';
    const av = document.getElementById('chatAvatar');
    av.innerHTML = u.fotoPerfil
      ? `<img class="avatar" src="${u.fotoPerfil}" style="width:36px;height:36px"/>`
      : `<div class="avatar-placeholder" style="width:36px;height:36px;font-size:15px;border:none">${u.emoji}</div>`;
  } else if (paramConvId) {
    conversaId = paramConvId;
    const snap = await get(ref(db, 'conversas/' + conversaId));
    const conv = snap.val() || {};
    document.getElementById('chatName').textContent = conv.nomeGrupo || 'Grupo';
    participantes = conv.participantes || {};
    document.getElementById('chatSub').textContent = Object.keys(participantes).length + ' membros';
    document.getElementById('chatAvatar').innerHTML = `<div class="avatar-placeholder" style="width:36px;height:36px;font-size:15px;border:none">👥</div>`;
    document.getElementById('btnGroupManage').style.display = '';
  }

  loadMessages();
});

function loadMessages() {
  const container = document.getElementById('chatMessages');
  onValue(ref(db, `conversas/${conversaId}/mensagens`), async snap => {
    container.innerHTML = '';
    if (!snap.exists()) return;

    const msgs = [];
    snap.forEach(c => msgs.push({ id: c.key, ...c.val() }));
    msgs.sort((a, b) => a.timestamp - b.timestamp);

    for (const m of msgs) {
      const u = await getUser(m.uid);
      const isMine = m.uid === currentUser.uid;

      const wrap = document.createElement('div');
      wrap.style.display = 'flex';
      wrap.style.flexDirection = 'column';
      wrap.style.alignSelf = isMine ? 'flex-end' : 'flex-start';
      wrap.style.maxWidth = '75%';

      const bubble = document.createElement('div');
      bubble.className = `bubble ${isMine ? 'bubble-mine' : 'bubble-other'}`;

      if (!isMine && tipo !== 'privado') {
        const nameDiv = document.createElement('div');
        nameDiv.className = 'bubble-name';
        nameDiv.textContent = u.username;
        bubble.appendChild(nameDiv);
      }

      if (m.texto) {
        bubble.appendChild(document.createTextNode(m.texto));
      } else if (m.audioUrl) {
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = m.audioUrl;
        bubble.appendChild(audio);
      } else if (m.imagemUrl) {
        const img = document.createElement('img');
        img.src = m.imagemUrl;
        img.onclick = () => {
          document.getElementById('imgModalSrc').src = m.imagemUrl;
          document.getElementById('imgModal').style.display = 'flex';
        };
        bubble.appendChild(img);
      }

      const timeDiv = document.createElement('div');
      timeDiv.className = 'bubble-time';
      timeDiv.textContent = timeStr(m.timestamp);
      bubble.appendChild(timeDiv);

      wrap.appendChild(bubble);
      container.appendChild(wrap);
    }

    container.scrollTop = container.scrollHeight;
  });
}

// Send text
document.getElementById('btnSend').onclick = sendText;
document.getElementById('msgInput').onkeydown = (e) => { if (e.key === 'Enter') sendText(); };

async function sendText() {
  const txt = document.getElementById('msgInput').value.trim();
  if (!txt) return;
  await push(ref(db, `conversas/${conversaId}/mensagens`), {
    uid: currentUser.uid,
    texto: txt,
    timestamp: Date.now()
  });
  document.getElementById('msgInput').value = '';
}

// Audio
let mediaRecorder, audioChunks = [];
document.getElementById('btnRecord').onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      document.getElementById('audioPreview').src = URL.createObjectURL(blob);
      document.getElementById('audioPreview').style.display = '';
      document.getElementById('btnSendAudio').classList.remove('hidden');
      document.getElementById('recordStatus').textContent = 'Prévia:';
    };
    mediaRecorder.start();
    document.getElementById('audioModal').classList.remove('hidden');
  } catch { toast('Erro ao acessar microfone', 'error'); }
};

document.getElementById('btnStopRec').onclick = () => { if (mediaRecorder?.state === 'recording') mediaRecorder.stop(); };
document.getElementById('btnCancelAudio').onclick = () => document.getElementById('audioModal').classList.add('hidden');

document.getElementById('btnSendAudio').onclick = async () => {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const file = new File([blob], `audio_${Date.now()}.webm`);
  try {
    const path = uniquePath(`audios/${conversaId}`, file.name);
    const url = await uploadFile(file, path);
    await push(ref(db, `conversas/${conversaId}/mensagens`), {
      uid: currentUser.uid, audioUrl: url, timestamp: Date.now()
    });
  } catch (e) { toast('Erro ao enviar áudio', 'error'); }
  document.getElementById('audioModal').classList.add('hidden');
};

// Image
let selectedImgFile = null;
document.getElementById('btnSendImg').onclick = () => document.getElementById('imgFileInput').click();
document.getElementById('imgFileInput').onchange = (e) => {
  selectedImgFile = e.target.files[0];
  if (!selectedImgFile) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('imgPreviewSrc').src = ev.target.result;
    document.getElementById('imgPreviewModal').classList.remove('hidden');
  };
  reader.readAsDataURL(selectedImgFile);
};

document.getElementById('btnCancelImg').onclick = () => document.getElementById('imgPreviewModal').classList.add('hidden');
document.getElementById('btnConfirmImg').onclick = async () => {
  if (!selectedImgFile) return;
  document.getElementById('imgPreviewModal').classList.add('hidden');
  toast('Enviando imagem...');
  try {
    const path = uniquePath(`chat_imgs/${conversaId}`, selectedImgFile.name);
    const url = await uploadFile(selectedImgFile, path);
    await push(ref(db, `conversas/${conversaId}/mensagens`), {
      uid: currentUser.uid, imagemUrl: url, timestamp: Date.now()
    });
  } catch (e) { toast('Erro ao enviar imagem', 'error'); }
};
</script>
</body>
</html>
