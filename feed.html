<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Feed — Vibe</title>
  <link rel="stylesheet" href="css/global.css"/>
</head>
<body>

<!-- STORY VIEWER -->
<div id="storyViewer" class="story-viewer hidden">
  <div id="storyProgressBars" style="display:flex;gap:4px;padding:50px 12px 8px;position:absolute;top:0;left:0;right:0;z-index:1"></div>
  <div class="story-header">
    <div class="avatar-placeholder" id="storyAvatar" style="width:36px;height:36px;font-size:16px"></div>
    <div>
      <div id="storyUsername" style="color:#fff;font-weight:600;font-size:14px"></div>
      <div id="storyTime" style="color:rgba(255,255,255,0.6);font-size:11px"></div>
    </div>
    <button id="storyDeleteBtn" class="hidden" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px 8px;margin-left:auto" title="Deletar story">🗑️</button>
    <button class="story-close" id="storyClose">×</button>
  </div>
  <img id="storyImg" class="story-viewer-img" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain"/>
  <div style="position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(transparent,rgba(0,0,0,0.4));pointer-events:none"></div>
  <div style="position:absolute;inset:0;display:flex">
    <div id="storyPrev" style="flex:1;cursor:pointer"></div>
    <div id="storyNext" style="flex:1;cursor:pointer"></div>
  </div>
</div>

<!-- COMMENT MODAL -->
<div id="commentModal" class="modal-backdrop hidden">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-family:'Syne',sans-serif">Comentários</h3>
      <button class="btn-ghost" id="closeComments" style="font-size:22px;padding:4px 8px">×</button>
    </div>
    <div id="commentsList" style="max-height:300px;overflow-y:auto;margin-bottom:16px"></div>
    <div style="display:flex;gap:8px">
      <input class="input" id="commentInput" placeholder="Adicionar comentário..." style="flex:1"/>
      <button class="btn btn-primary" id="sendComment" style="padding:10px 16px">→</button>
    </div>
  </div>
</div>

<!-- IMAGE MODAL -->
<div id="imgModal" class="modal-backdrop hidden" style="align-items:center">
  <img id="imgModalSrc" style="max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain"/>
  <button id="closeImgModal" style="position:fixed;top:16px;right:16px;background:rgba(0,0,0,0.5);border:none;color:#fff;font-size:28px;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
</div>

<div class="topbar">
  <div class="topbar-logo">Vibe</div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn-ghost" id="btnNotif" style="font-size:22px;position:relative">
      🔔
      <span class="badge hidden" id="notifBadge" style="position:absolute;top:4px;right:4px;width:14px;height:14px;font-size:9px"></span>
    </button>
  </div>
</div>

<div class="page" id="app" style="display:none">
  <!-- STORIES -->
  <div class="stories-row" id="storiesRow"></div>

  <!-- FEED -->
  <div id="feedContainer">
    <div class="empty-state">
      <div class="spinner" style="margin:0 auto"></div>
    </div>
  </div>
</div>

<!-- FAB (botao flutuante criar post) -->
<button class="fab" id="btnNewPost" aria-label="Criar post">+</button>

<!-- NEW POST MODAL -->
<div id="newPostModal" class="modal-backdrop hidden">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-family:'Syne',sans-serif">Novo post</h3>
      <button class="btn-ghost" id="closeNewPost" style="font-size:22px;padding:4px 8px">×</button>
    </div>

    <!-- Tabs de tipo -->
    <div class="post-type-tabs" id="postTypeTabs">
      <button class="post-type-tab active" data-type="foto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Foto
      </button>
      <button class="post-type-tab" data-type="video">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Vídeo
      </button>
      <button class="post-type-tab" data-type="texto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        Texto
      </button>
    </div>

    <!-- Preview de mídia -->
    <div id="postPreviewWrap" class="hidden" style="margin-bottom:12px;position:relative">
      <img id="postPreview" style="width:100%;border-radius:12px;object-fit:cover;max-height:300px;display:none"/>
      <video id="postVideoPreview" style="width:100%;border-radius:12px;max-height:300px;display:none" controls></video>
      <button id="btnRemoveMedia" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px">×</button>
    </div>

    <!-- Botão de selecionar (muda conforme a tab) -->
    <button class="btn btn-outline" id="btnSelectMedia" style="width:100%;margin-bottom:12px">📷 Selecionar foto</button>
    <input type="file" id="mediaInput" accept="image/*" style="display:none"/>

    <!-- Caption / texto -->
    <textarea class="input" id="postCaption" rows="3" placeholder="Escreva uma legenda..." style="margin-bottom:12px"></textarea>
    <div id="captionCounter" style="font-size:11px;color:var(--text3);text-align:right;margin-top:-8px;margin-bottom:10px;display:none">0 / 500</div>

    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" id="btnPostStory" style="flex:1">Story (24h)</button>
      <button class="btn btn-primary" id="btnPublish" style="flex:1">Publicar</button>
    </div>
    <div id="uploadProgress" class="hidden" style="margin-top:12px">
      <div style="background:var(--bg3);border-radius:50px;height:6px;overflow:hidden">
        <div id="progressBar" style="height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width 0.3s;border-radius:50px"></div>
      </div>
      <div id="progressText" style="font-size:12px;color:var(--text2);margin-top:6px;text-align:center">Enviando...</div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="feed.html" class="active">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>

    Buscar

    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    Chat
  </a>

    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    Notif

    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>

<div id="toast-container"></div>

<script type="module">
import { auth, db } from "./js/config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import {
  ref, onValue, push, set, get, remove, query, orderByChild, limitToLast, endBefore
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
import { uploadFile, uniquePath } from "./js/storage.js";
import {
  escapeHTML, sanitizeText, validateCaption, validateComment, validateVideoDuration
} from "./js/validation.js";
import { rateLimiter } from "./js/rateLimiter.js";
import {
  watchBlockedUsers, isBlocked, blockUser, denunciar,
  abrirModalDenuncia, abrirMenuContexto
} from "./js/moderation.js";

let currentUser = null;
let myProfile = null;
let currentPostId = null;
let selectedFile = null;
const userCache = {};

// Paginação do feed
const PAGE_SIZE = 30;
let oldestTimestamp = null;
let loadedPostIds = new Set();
let loadingMore = false;

function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'agora';
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  return Math.floor(h / 24) + 'd';
}

async function getUser(uid) {
  if (userCache[uid]) return userCache[uid];
  const snap = await get(ref(db, 'usuarios/' + uid));
  userCache[uid] = snap.val() || { username: 'usuário', emoji: '👤' };
  return userCache[uid];
}

onAuthStateChanged(auth, async user => {
  if (!user || !user.emailVerified) return window.location.href = 'index.html';
  currentUser = user;
  const snap = await get(ref(db, 'usuarios/' + user.uid));
  myProfile = snap.val() || {};
  // Escuta lista de bloqueados em tempo real (atualiza cache do moderation.js)
  watchBlockedUsers(currentUser.uid, () => loadFeed());
  document.getElementById('app').style.display = '';
  loadStories();
  loadFeed();
  loadNotifBadge();
});

// ── STORIES ──
function loadStories() {
  const row = document.getElementById('storiesRow');
  // Add story button
  const addBtn = document.createElement('div');
  addBtn.className = 'story-thumb';
  addBtn.innerHTML = `
    <div class="story-ring" style="background:var(--border)">
      <div class="story-ring-inner">
        <div class="avatar-placeholder" style="width:52px;height:52px;font-size:22px;border:none">+</div>
      </div>
    </div>
    <span>Seu story</span>`;
  addBtn.onclick = () => {
    document.getElementById('btnPostStory').scrollIntoView();
    document.getElementById('newPostModal').classList.remove('hidden');
  };
  row.appendChild(addBtn);

  const cutoff = Date.now() - 86400000;
  onValue(ref(db, 'stories'), async snap => {
    // Remove old story thumbs except first
    while (row.children.length > 1) row.removeChild(row.lastChild);

    const storiesByUser = {};
    snap.forEach(child => {
      const s = child.val();
      if (s.timestamp < cutoff) return;
      if (!storiesByUser[s.uid]) storiesByUser[s.uid] = [];
      storiesByUser[s.uid].push({ id: child.key, ...s });
    });

    for (const uid in storiesByUser) {
      const u = await getUser(uid);
      const thumb = document.createElement('div');
      thumb.className = 'story-thumb';
      const seen = storiesByUser[uid].every(s => s.visto && s.visto[currentUser.uid]);
      thumb.innerHTML = `
        <div class="story-ring ${seen ? 'seen' : ''}">
          <div class="story-ring-inner">
            ${u.fotoPerfil
              ? `<img class="avatar" src="${u.fotoPerfil}" style="width:52px;height:52px"/>`
              : `<div class="avatar-placeholder" style="width:52px;height:52px;font-size:22px;border:none">${u.emoji}</div>`}
          </div>
        </div>
        <span>${u.username}</span>`;
      thumb.onclick = () => openStoryViewer(storiesByUser[uid], u);
      row.appendChild(thumb);
    }
  });
}

let storyTimeout;
let currentStories = [];
let storyIndex = 0;

function openStoryViewer(stories, user) {
  currentStories = stories;
  storyIndex = 0;
  document.getElementById('storyViewer').classList.remove('hidden');
  document.getElementById('storyUsername').textContent = user.emoji + ' ' + user.username;
  showStory(0);
}

function showStory(idx) {
  clearTimeout(storyTimeout);
  if (idx >= currentStories.length) {
    document.getElementById('storyViewer').classList.add('hidden');
    return;
  }
  const s = currentStories[idx];
  document.getElementById('storyImg').src = s.imagemUrl;
  document.getElementById('storyTime').textContent = timeAgo(s.timestamp);

  // Mark as seen
  set(ref(db, `stories/${s.id}/visto/${currentUser.uid}`), true);

  // Botão de deletar (só para o dono do story)
  const deleteBtn = document.getElementById('storyDeleteBtn');
  if (s.uid === currentUser.uid) {
    deleteBtn.classList.remove('hidden');
    deleteBtn.onclick = async () => {
      clearTimeout(storyTimeout);
      if (!confirm('Deletar este story?')) {
        storyTimeout = setTimeout(() => showStory(idx + 1), 5000);
        return;
      }
      await remove(ref(db, `stories/${s.id}`));
      document.getElementById('storyViewer').classList.add('hidden');
    };
  } else {
    deleteBtn.classList.add('hidden');
    deleteBtn.onclick = null;
  }

  // Progress bars
  const bars = document.getElementById('storyProgressBars');
  bars.innerHTML = '';
  currentStories.forEach((_, i) => {
    const bar = document.createElement('div');
    bar.className = 'story-progress-bar';
    bar.style.flex = '1';
    if (i < idx) bar.innerHTML = '<div style="height:100%;background:#fff;border-radius:2px"></div>';
    else if (i === idx) bar.innerHTML = '<div class="story-progress-fill"></div>';
    bars.appendChild(bar);
  });

  storyTimeout = setTimeout(() => showStory(idx + 1), 5000);
}

document.getElementById('storyClose').onclick = () => {
  clearTimeout(storyTimeout);
  document.getElementById('storyViewer').classList.add('hidden');
};
document.getElementById('storyPrev').onclick = () => { storyIndex = Math.max(0, storyIndex - 1); showStory(storyIndex); };
document.getElementById('storyNext').onclick = () => { storyIndex++; showStory(storyIndex); };

// ── FEED ──
function loadFeed() {
  const container = document.getElementById('feedContainer');
  const postsRef = query(ref(db, 'posts'), orderByChild('timestamp'), limitToLast(PAGE_SIZE));
  onValue(postsRef, async snap => {
    container.innerHTML = '';
    const posts = [];
    snap.forEach(child => { posts.unshift({ id: child.key, ...child.val() }); });

    // Filtra posts de usuários bloqueados
    const visiblePosts = posts.filter(p => !isBlocked(p.uid));

    if (visiblePosts.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Nenhum post ainda. Seja o primeiro!</p></div>';
      return;
    }

    // Reset estado de paginação
    loadedPostIds = new Set();
    oldestTimestamp = null;

    for (const post of visiblePosts) {
      loadedPostIds.add(post.id);
      if (!oldestTimestamp || post.timestamp < oldestTimestamp) oldestTimestamp = post.timestamp;
      const card = await buildPostCard(post);
      container.appendChild(card);
    }

    if (visiblePosts.length >= PAGE_SIZE) {
      addLoadMoreBtn(container);
    }
  });
}

function addLoadMoreBtn(container) {
  const existing = container.querySelector('#loadMoreBtn');
  if (existing) existing.remove();
  const btn = document.createElement('button');
  btn.id = 'loadMoreBtn';
  btn.className = 'btn btn-outline';
  btn.style.cssText = 'width:calc(100% - 32px);margin:8px 16px 24px;font-size:14px';
  btn.textContent = '↓ Carregar mais posts';
  btn.onclick = () => loadMorePosts(container);
  container.appendChild(btn);
}

async function loadMorePosts(container) {
  if (loadingMore || !oldestTimestamp) return;
  loadingMore = true;
  const btn = container.querySelector('#loadMoreBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Carregando...'; }

  try {
    const olderRef = query(
      ref(db, 'posts'),
      orderByChild('timestamp'),
      endBefore(oldestTimestamp - 1),
      limitToLast(PAGE_SIZE)
    );
    const snap = await get(olderRef);
    const posts = [];
    snap.forEach(child => { posts.unshift({ id: child.key, ...child.val() }); });

    const visiblePosts = posts.filter(p => !isBlocked(p.uid) && !loadedPostIds.has(p.id));

    if (btn) btn.remove();

    if (visiblePosts.length === 0) {
      const end = document.createElement('div');
      end.style.cssText = 'text-align:center;color:var(--text3);font-size:13px;padding:24px 16px';
      end.textContent = '✓ Você chegou ao início do feed';
      container.appendChild(end);
      return;
    }

    for (const post of visiblePosts) {
      loadedPostIds.add(post.id);
      if (post.timestamp < oldestTimestamp) oldestTimestamp = post.timestamp;
      const card = await buildPostCard(post);
      container.appendChild(card);
    }

    if (visiblePosts.length >= PAGE_SIZE) {
      addLoadMoreBtn(container);
    } else {
      const end = document.createElement('div');
      end.style.cssText = 'text-align:center;color:var(--text3);font-size:13px;padding:24px 16px';
      end.textContent = '✓ Você chegou ao início do feed';
      container.appendChild(end);
    }
  } catch (e) {
    console.error('Erro ao carregar mais:', e);
    if (btn) { btn.disabled = false; btn.textContent = '↓ Carregar mais posts'; }
  } finally {
    loadingMore = false;
  }
}

async function buildPostCard(post) {
  const u = await getUser(post.uid);
  const likeCount = post.curtidas ? Object.keys(post.curtidas).length : 0;
  const commentCount = post.comentarios ? Object.keys(post.comentarios).length : 0;
  const liked = post.curtidas && post.curtidas[currentUser.uid];

  // Detecta tipo (retrocompat: sem tipo + imagemUrl = foto)
  const tipo = post.tipo || (post.videoUrl ? 'video' : (post.imagemUrl ? 'foto' : 'texto'));

  const card = document.createElement('div');
  card.className = 'post-card';
  card.dataset.postId = post.id;

  const SVG_HEART_FILLED = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg>';
  const SVG_HEART = '<svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg>';
  const SVG_COMMENT = '<svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>';
  const SVG_SHARE = '<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  const SVG_BOOKMARK = '<svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
  const SVG_MORE = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>';
  const SVG_VIDEO_BADGE = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  const SVG_VOL_OFF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
  const SVG_VOL_ON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';

  const avatarHtml = u.fotoPerfil
    ? `<img class="avatar" src="${u.fotoPerfil}" style="width:34px;height:34px;cursor:pointer" onclick="goProfile('${post.uid}')"/>`
    : `<div class="avatar-placeholder" style="width:34px;height:34px;font-size:15px;cursor:pointer" onclick="goProfile('${post.uid}')">${u.emoji}</div>`;

  // Corpo do post conforme o tipo
  let bodyHtml = '';
  if (tipo === 'foto') {
    bodyHtml = `
      <div class="post-img-wrap">
        <img class="post-img" src="${post.imagemUrl}" loading="lazy"/>
        <div class="heart-overlay" id="heart-overlay-${post.id}">❤</div>
      </div>`;
  } else if (tipo === 'video') {
    bodyHtml = `
      <div class="post-video-wrap">
        <video class="post-video" id="video-${post.id}" src="${post.videoUrl}" loop muted playsinline preload="metadata"></video>
        <div class="post-video-badge">${SVG_VIDEO_BADGE}<span>Vídeo</span></div>
        <button class="post-video-mute" id="mute-${post.id}" aria-label="Som">${SVG_VOL_OFF}</button>
        <div class="heart-overlay" id="heart-overlay-${post.id}">❤</div>
      </div>`;
  } else if (tipo === 'texto') {
    const text = post.texto || '';
    bodyHtml = `<div class="post-text-card ${text.length > 140 ? 'long' : ''}">${escapeHTML(text)}</div>`;
  }

  card.innerHTML = `
    <div class="post-header">
      ${avatarHtml}
      <div class="post-header-info">
        <div class="post-username" onclick="goProfile('${post.uid}')">${u.username}</div>
      </div>
      <button class="action-btn post-more-btn" style="color:var(--text3)" data-post-id="${post.id}" data-post-uid="${post.uid}" aria-label="Mais opções">${SVG_MORE}</button>
    </div>
    ${bodyHtml}
    <div class="post-actions">
      <button class="action-btn ${liked ? 'liked' : ''}" id="like-${post.id}" aria-label="Curtir">
        ${liked ? SVG_HEART_FILLED : SVG_HEART}
      </button>
      <button class="action-btn" onclick="openComments('${post.id}')" aria-label="Comentar">${SVG_COMMENT}</button>
      <button class="action-btn" onclick="sharePost('${post.id}')" aria-label="Compartilhar">${SVG_SHARE}</button>
      <span class="spacer"></span>
      <button class="action-btn" aria-label="Salvar">${SVG_BOOKMARK}</button>
    </div>
    ${likeCount > 0 ? `<div class="post-likes">${likeCount} ${likeCount === 1 ? 'curtida' : 'curtidas'}</div>` : ''}
    ${post.legenda && tipo !== 'texto' ? `
      <div class="post-caption">
        <strong onclick="goProfile('${post.uid}')">${u.username}</strong><span>${escapeHTML(post.legenda)}</span>
      </div>` : ''}
    ${commentCount > 0 ? `<div class="post-comments-preview" onclick="openComments('${post.id}')">Ver todos os ${commentCount} comentários</div>` : ''}
    <div class="post-time-bottom">${timeAgoFull(post.timestamp)}</div>
  `;

  // Like button
  card.querySelector(`#like-${post.id}`).onclick = () => toggleLike(post.id);

  // Menu de ⋯ (denunciar / bloquear / deletar)
  const moreBtn = card.querySelector('.post-more-btn');
  if (moreBtn) {
    moreBtn.onclick = (e) => {
      e.stopPropagation();
      const isOwn = post.uid === currentUser.uid;
      const items = isOwn
        ? [{ label: 'Excluir post', icon: '🗑️', danger: true, onClick: () => deletePost(post.id) }]
        : [
            { label: 'Denunciar', icon: '🚩', onClick: () => denunciarPost(post.id, post.uid) },
            { label: 'Bloquear usuário', icon: '🚫', danger: true, onClick: () => bloquearUsuario(post.uid, u.username) }
          ];
      abrirMenuContexto(moreBtn, items);
    };
  }

  // Handlers específicos por tipo
  if (tipo === 'foto') {
    const img = card.querySelector('.post-img');
    if (img) attachDoubleTapLike(img, post, liked);
  } else if (tipo === 'video') {
    const video = card.querySelector(`#video-${post.id}`);
    const muteBtn = card.querySelector(`#mute-${post.id}`);

    // Autoplay muted quando entra na viewport
    if (video && !window._videoObserver) {
      window._videoObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const v = entry.target;
          if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
            v.play().catch(() => {});
          } else {
            v.pause();
          }
        });
      }, { threshold: [0, 0.6, 1] });
    }
    if (video) window._videoObserver.observe(video);

    // Toggle mute
    if (muteBtn && video) {
      muteBtn.onclick = (e) => {
        e.stopPropagation();
        video.muted = !video.muted;
        muteBtn.innerHTML = video.muted ? SVG_VOL_OFF : SVG_VOL_ON;
      };
    }

    // Tap no vídeo: pausa/play
    if (video) {
      attachDoubleTapLike(video, post, liked, () => {
        if (video.paused) video.play().catch(() => {});
        else video.pause();
      });
    }
  }

  return card;
}

// Helper: double-tap pra curtir + single-tap ação customizada
function attachDoubleTapLike(el, post, wasLiked, singleTapAction) {
  let lastTap = 0;
  el.addEventListener('click', (e) => {
    const now = Date.now();
    if (now - lastTap < 300) {
      e.preventDefault();
      if (!wasLiked) toggleLike(post.id);
      const overlay = document.getElementById(`heart-overlay-${post.id}`);
      if (overlay) {
        overlay.classList.remove('pop');
        void overlay.offsetWidth;
        overlay.classList.add('pop');
      }
      lastTap = 0;
    } else {
      lastTap = now;
      setTimeout(() => {
        if (lastTap === now) {
          if (singleTapAction) singleTapAction();
          else if (post.imagemUrl) openImgModal(post.imagemUrl);
        }
      }, 300);
    }
  });
}

function timeAgoFull(ts) {
  const diff = Date.now() - ts;
  const d = Math.floor(diff / 86400000);
  if (d === 0) return 'hoje';
  if (d === 1) return 'ontem';
  if (d < 7) return `${d} dias atrás`;
  return new Date(ts).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
}

window.sharePost = async (postId) => {
  const url = `${location.origin}/feed.html?post=${postId}`;
  if (navigator.share) {
    try { await navigator.share({ title: 'Vibe', url }); } catch {}
  } else {
    await navigator.clipboard.writeText(url);
    toast('Link copiado!', 'success');
  }
};

async function denunciarPost(postId, postUid) {
  const res = await abrirModalDenuncia('esse post');
  if (!res) return;
  try {
    await denunciar(currentUser.uid, 'post', postId, res.motivoId, res.descricao, { postUid });
    toast('Denúncia enviada. Obrigado!', 'success');
  } catch (e) {
    console.error(e);
    toast('Erro ao enviar denúncia', 'error');
  }
}

async function bloquearUsuario(targetUid, username) {
  if (!confirm(`Bloquear @${username}?\n\nVocê não verá mais posts, mensagens ou comentários dessa pessoa.`)) return;
  try {
    await blockUser(currentUser.uid, targetUid);
    toast(`@${username} bloqueado`, 'success');
  } catch (e) {
    console.error(e);
    toast('Erro ao bloquear', 'error');
  }
}

async function toggleLike(postId) {
  const likeRef = ref(db, `posts/${postId}/curtidas/${currentUser.uid}`);
  const snap = await get(likeRef);
  if (snap.exists()) {
    await remove(likeRef);
  } else {
    await set(likeRef, true);
    // Notify post owner
    const postSnap = await get(ref(db, 'posts/' + postId));
    const post = postSnap.val();
    if (post && post.uid !== currentUser.uid) {
      push(ref(db, `notificacoes/${post.uid}`), {
        tipo: 'curtida',
        de: currentUser.uid,
        postId,
        timestamp: Date.now(),
        lida: false
      });
    }
  }
}

window.goProfile = (uid) => {
  window.location.href = `perfil.html?uid=${uid}`;
};

// Renderiza texto de comentário com @menções destacadas (seguro, sem innerHTML)
function renderTextWithMentions(el, text) {
  const parts = text.split(/(@[a-zA-Z0-9_]+)/g);
  parts.forEach(part => {
    if (/^@[a-zA-Z0-9_]+$/.test(part)) {
      const span = document.createElement('span');
      span.className = 'mention';
      span.textContent = part;
      el.appendChild(span);
    } else {
      el.appendChild(document.createTextNode(part));
    }
  });
}

window.deletePost = async (postId) => {
  if (!confirm('Deletar este post?')) return;
  await remove(ref(db, 'posts/' + postId));
  toast('Post deletado', 'success');
};

window.openComments = (postId) => {
  currentPostId = postId;
  document.getElementById('commentModal').classList.remove('hidden');
  loadComments(postId);
};

function openImgModal(url) {
  document.getElementById('imgModalSrc').src = url;
  document.getElementById('imgModal').classList.remove('hidden');
}

document.getElementById('closeImgModal').onclick = () => document.getElementById('imgModal').classList.add('hidden');
document.getElementById('imgModal').onclick = (e) => { if (e.target === document.getElementById('imgModal')) document.getElementById('imgModal').classList.add('hidden'); };

function loadComments(postId) {
  const list = document.getElementById('commentsList');
  list.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px">Carregando...</div>';
  onValue(ref(db, `posts/${postId}/comentarios`), async snap => {
    list.innerHTML = '';
    if (!snap.exists()) {
      list.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px;padding:16px">Sem comentários ainda</div>';
      return;
    }
    const items = [];
    snap.forEach(c => { items.push({ id: c.key, ...c.val() }); });
    items.sort((a, b) => a.timestamp - b.timestamp);

    for (const c of items) {
      const u = await getUser(c.uid);
      const div = document.createElement('div');
      div.className = 'comment-item';

      // Avatar
      const avatarDiv = document.createElement('div');
      if (u.fotoPerfil) {
        const img = document.createElement('img');
        img.className = 'avatar';
        img.src = u.fotoPerfil;
        img.style.width = '32px';
        img.style.height = '32px';
        avatarDiv.appendChild(img);
      } else {
        const placeholder = document.createElement('div');
        placeholder.className = 'avatar-placeholder';
        placeholder.style.width = '32px';
        placeholder.style.height = '32px';
        placeholder.style.fontSize = '14px';
        placeholder.style.border = 'none';
        placeholder.textContent = u.emoji;
        avatarDiv.appendChild(placeholder);
      }

      // Body
      const body = document.createElement('div');
      body.className = 'comment-body';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'comment-name';
      nameSpan.textContent = u.username;

      const textDiv = document.createElement('div');
      textDiv.className = 'comment-text';
      renderTextWithMentions(textDiv, sanitizeText(c.texto));

      const timeDiv = document.createElement('div');
      timeDiv.className = 'comment-time';
      timeDiv.textContent = timeAgo(c.timestamp);

      body.appendChild(nameSpan);
      body.appendChild(textDiv);
      body.appendChild(timeDiv);

      div.appendChild(avatarDiv);
      div.appendChild(body);
      list.appendChild(div);
    }
    list.scrollTop = list.scrollHeight;
  });
}

document.getElementById('closeComments').onclick = () => document.getElementById('commentModal').classList.add('hidden');

document.getElementById('sendComment').onclick = async () => {
  const txt = document.getElementById('commentInput').value.trim();

  // Validação básica
  if (!txt || !currentPostId) return toast('Comentário não pode estar vazio', 'error');

  // Validar comentário
  const error = validateComment(txt);
  if (error) return toast(error, 'error');

  // Rate limiting
  const rateLimitCheck = rateLimiter.checkLimit(currentUser.uid, 'comment');
  if (!rateLimitCheck.allowed) {
    return toast(rateLimitCheck.message, 'error');
  }

  try {
    // Sanitizar antes de salvar
    const safeText = sanitizeText(txt);

    await push(ref(db, `posts/${currentPostId}/comentarios`), {
      uid: currentUser.uid,
      texto: safeText,
      timestamp: Date.now()
    });

    // Notificar autor do post
    const postSnap = await get(ref(db, 'posts/' + currentPostId));
    const post = postSnap.val();
    if (post && post.uid !== currentUser.uid) {
      push(ref(db, `notificacoes/${post.uid}`), {
        tipo: 'comentario',
        de: currentUser.uid,
        postId: currentPostId,
        timestamp: Date.now(),
        lida: false
      });
    }

    // Detectar e notificar @menções
    const mentionRegex = /@([a-zA-Z0-9_]+)/g;
    const mentions = [...safeText.matchAll(mentionRegex)].map(m => m[1].toLowerCase());
    if (mentions.length > 0) {
      const mentionedSet = new Set(mentions);
      const usersSnap = await get(ref(db, 'usuarios'));
      usersSnap.forEach(c => {
        const u = c.val();
        const uname = (u.username || '').toLowerCase();
        // Não notifica a si mesmo nem o autor do post (que já foi notificado)
        if (mentionedSet.has(uname) && c.key !== currentUser.uid && c.key !== (post && post.uid)) {
          push(ref(db, `notificacoes/${c.key}`), {
            tipo: 'mencao',
            de: currentUser.uid,
            postId: currentPostId,
            timestamp: Date.now(),
            lida: false
          });
        }
      });
    }

    document.getElementById('commentInput').value = '';
    toast('Comentário adicionado!', 'success');
  } catch (e) {
    toast('Erro ao comentar: ' + e.message, 'error');
  }
};

// ── NEW POST ──
let postType = 'foto'; // 'foto' | 'video' | 'texto'

document.getElementById('btnNewPost').onclick = () => {
  document.getElementById('newPostModal').classList.remove('hidden');
  setPostType('foto');
};
document.getElementById('closeNewPost').onclick = () => document.getElementById('newPostModal').classList.add('hidden');

function setPostType(type) {
  postType = type;
  document.querySelectorAll('.post-type-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.type === type);
  });

  const selectBtn = document.getElementById('btnSelectMedia');
  const input = document.getElementById('mediaInput');
  const caption = document.getElementById('postCaption');
  const counter = document.getElementById('captionCounter');
  const storyBtn = document.getElementById('btnPostStory');

  // Reset preview
  clearMediaPreview();

  if (type === 'foto') {
    selectBtn.style.display = '';
    selectBtn.textContent = '📷 Selecionar foto';
    input.accept = 'image/*';
    caption.placeholder = 'Escreva uma legenda...';
    counter.style.display = 'none';
    storyBtn.style.display = '';
  } else if (type === 'video') {
    selectBtn.style.display = '';
    selectBtn.textContent = '🎬 Selecionar vídeo (até 30s)';
    input.accept = 'video/mp4,video/webm,video/quicktime';
    caption.placeholder = 'Escreva uma legenda...';
    counter.style.display = 'none';
    storyBtn.style.display = 'none'; // stories são só foto por enquanto
  } else if (type === 'texto') {
    selectBtn.style.display = 'none';
    caption.placeholder = 'No que você está pensando?';
    counter.style.display = '';
    updateCaptionCounter();
    storyBtn.style.display = 'none';
  }
}

function clearMediaPreview() {
  selectedFile = null;
  document.getElementById('mediaInput').value = '';
  document.getElementById('postPreview').src = '';
  document.getElementById('postPreview').style.display = 'none';
  document.getElementById('postVideoPreview').src = '';
  document.getElementById('postVideoPreview').style.display = 'none';
  document.getElementById('postPreviewWrap').classList.add('hidden');
}

function updateCaptionCounter() {
  const len = document.getElementById('postCaption').value.length;
  document.getElementById('captionCounter').textContent = `${len} / 500`;
  document.getElementById('captionCounter').style.color = len > 500 ? 'var(--accent2)' : 'var(--text3)';
}

document.getElementById('postCaption').addEventListener('input', updateCaptionCounter);

// Tabs
document.querySelectorAll('.post-type-tab').forEach(tab => {
  tab.onclick = () => setPostType(tab.dataset.type);
});

document.getElementById('btnSelectMedia').onclick = () => document.getElementById('mediaInput').click();
document.getElementById('btnRemoveMedia').onclick = clearMediaPreview;

document.getElementById('mediaInput').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  // Detectar tipo
  const isVideo = file.type.startsWith('video/');
  const isImage = file.type.startsWith('image/');

  if (postType === 'foto' && !isImage) { toast('Selecione uma imagem', 'error'); return; }
  if (postType === 'video' && !isVideo) { toast('Selecione um vídeo', 'error'); return; }

  // Validar duração do vídeo
  if (isVideo) {
    const durErr = await validateVideoDuration(file, 30);
    if (durErr) { toast(durErr, 'error'); return; }

    if (file.size > 20 * 1024 * 1024) {
      toast('Vídeo muito grande. Máximo: 20MB', 'error');
      return;
    }
  }

  selectedFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    const wrap = document.getElementById('postPreviewWrap');
    wrap.classList.remove('hidden');
    if (isVideo) {
      const vid = document.getElementById('postVideoPreview');
      vid.src = ev.target.result;
      vid.style.display = '';
      document.getElementById('postPreview').style.display = 'none';
    } else {
      const img = document.getElementById('postPreview');
      img.src = ev.target.result;
      img.style.display = '';
      document.getElementById('postVideoPreview').style.display = 'none';
    }
  };
  reader.readAsDataURL(file);
};

async function publish(isStory = false) {
  const caption = document.getElementById('postCaption').value.trim();

  // Validações por tipo
  if (postType === 'texto') {
    if (!caption) return toast('Escreva algo', 'error');
    if (caption.length > 500) return toast('Texto muito longo (máx 500)', 'error');
  } else {
    if (!selectedFile) return toast('Selecione uma mídia', 'error');
    if (caption) {
      const captionError = validateCaption(caption);
      if (captionError) return toast(captionError, 'error');
    }
  }

  document.getElementById('btnPublish').disabled = true;
  document.getElementById('btnPostStory').disabled = true;

  try {
    const safeCaption = caption ? sanitizeText(caption) : '';

    // POST DE TEXTO: sem upload
    if (postType === 'texto') {
      await push(ref(db, 'posts'), {
        uid: currentUser.uid,
        tipo: 'texto',
        texto: safeCaption,
        timestamp: Date.now()
      });
      toast('Post publicado! 🎉', 'success');
      selectedFile = null;
      document.getElementById('postCaption').value = '';
      document.getElementById('newPostModal').classList.add('hidden');
      return;
    }

    // POST DE FOTO ou VÍDEO: upload + gravar
    const isVideo = selectedFile.type.startsWith('video/');
    document.getElementById('uploadProgress').classList.remove('hidden');

    const folder = isStory ? 'stories' : (isVideo ? 'videos' : 'posts');
    const path = uniquePath(`${folder}/${currentUser.uid}`, selectedFile.name);

    const url = await uploadFile(selectedFile, path,
      {
        maxSize: isVideo ? 20 * 1024 * 1024 : 5 * 1024 * 1024,
        allowedTypes: isVideo
          ? ['video/mp4', 'video/webm', 'video/quicktime']
          : ['image/jpeg', 'image/png', 'image/gif', 'image/webp']
      },
      (pct) => {
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = `Enviando... ${pct}%`;
      }
    );

    if (isStory) {
      await push(ref(db, 'stories'), {
        uid: currentUser.uid,
        imagemUrl: url,
        timestamp: Date.now()
      });
      toast('Story publicado! ✨', 'success');
    } else if (isVideo) {
      await push(ref(db, 'posts'), {
        uid: currentUser.uid,
        tipo: 'video',
        videoUrl: url,
        legenda: safeCaption,
        timestamp: Date.now()
      });
      toast('Vídeo publicado! 🎬', 'success');
    } else {
      await push(ref(db, 'posts'), {
        uid: currentUser.uid,
        tipo: 'foto',
        imagemUrl: url,
        legenda: safeCaption,
        timestamp: Date.now()
      });
      toast('Post publicado! 🎉', 'success');
    }

    // Limpar
    clearMediaPreview();
    document.getElementById('postCaption').value = '';
    document.getElementById('newPostModal').classList.add('hidden');

  } catch (e) {
    console.error('Erro no upload:', e);
    toast('Erro: ' + (e.message || 'desconhecido'), 'error');
  } finally {
    document.getElementById('uploadProgress').classList.add('hidden');
    document.getElementById('btnPublish').disabled = false;
    document.getElementById('btnPostStory').disabled = false;
  }
}

document.getElementById('btnPublish').onclick = () => publish(false);
document.getElementById('btnPostStory').onclick = () => publish(true);

// ── NOTIFICATIONS BADGE ──
function loadNotifBadge() {
  onValue(ref(db, `notificacoes/${currentUser.uid}`), snap => {
    let unread = 0;
    snap.forEach(c => { if (!c.val().lida) unread++; });
    const badge = document.getElementById('notifBadge');
    if (unread > 0) {
      badge.textContent = unread > 9 ? '9+' : unread;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  });
}

document.getElementById('btnNotif').onclick = () => window.location.href = 'notificacoes.html';
