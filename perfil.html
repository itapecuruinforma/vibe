<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Presença — Vibe</title>
  <link rel="stylesheet" href="css/global.css"/>
</head>
<body>

<div id="imgModal" class="modal-backdrop hidden" style="align-items:center">
  <img id="imgModalSrc" style="max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain"/>
  <button id="closeImgModal" style="position:fixed;top:16px;right:16px;background:rgba(0,0,0,0.5);border:none;color:#fff;font-size:28px;border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal-backdrop hidden">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-family:'Syne',sans-serif">Editar presença</h3>
      <button class="btn-ghost" id="closeEdit" style="font-size:22px;padding:4px 8px">×</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="text-align:center">
        <div id="editAvatarPreview" style="width:80px;height:80px;margin:0 auto 12px;cursor:pointer;position:relative">
        </div>
        <button class="btn btn-outline" id="btnChangePhoto" style="font-size:13px;padding:8px 16px">📷 Mudar foto</button>
        <input type="file" id="photoInput" accept="image/*" style="display:none"/>
      </div>
      <input class="input" id="editEmoji" placeholder="Emoji"/>
      <textarea class="input" id="editBio" rows="3" placeholder="Bio..."></textarea>
      <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px">
        <div style="font-size:12px;color:var(--text3);margin-bottom:10px;font-weight:600">🔗 SUAS REDES SOCIAIS</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:18px;width:24px;text-align:center">📸</span>
            <input class="input" id="editInstagram" placeholder="Instagram (só o @usuário)" style="flex:1;font-size:13px;padding:8px 10px"/>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:18px;width:24px;text-align:center">𝕏</span>
            <input class="input" id="editX" placeholder="X / Twitter (só o @usuário)" style="flex:1;font-size:13px;padding:8px 10px"/>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:18px;width:24px;text-align:center">🎵</span>
            <input class="input" id="editTiktok" placeholder="TikTok (só o @usuário)" style="flex:1;font-size:13px;padding:8px 10px"/>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:18px;width:24px;text-align:center">▶️</span>
            <input class="input" id="editYoutube" placeholder="YouTube (@canal ou URL)" style="flex:1;font-size:13px;padding:8px 10px"/>
          </div>
        </div>
      </div>
      <button class="btn btn-primary" id="btnSaveEdit" style="width:100%">Salvar</button>
    </div>
  </div>
</div>

<div class="topbar">
  <button class="btn-ghost" onclick="history.back()" style="font-size:20px;padding:4px 8px">←</button>
  <span id="topbarUsername" style="font-family:'Syne',sans-serif;font-weight:700;font-size:17px"></span>
  <button class="btn-ghost" id="btnMenu" style="font-size:20px;padding:4px 8px">⋮</button>
</div>

<div class="page" id="app" style="display:none">

  <div class="profile-header">
    <div id="profileAvatar" style="flex-shrink:0"></div>
    <div style="flex:1">
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800" id="profileName"></div>
      <div class="profile-bio" id="profileBio" style="margin:4px 0 0"></div>
    </div>
  </div>

  <div class="profile-stats" style="margin-bottom:16px">
    <div class="stat-item" id="statPosts"><div class="stat-num" id="postCount">0</div><div class="stat-label">vibes</div></div>
    <div class="stat-item" id="statFollowers"><div class="stat-num" id="followerCount">0</div><div class="stat-label">seguidores</div></div>
    <div class="stat-item" id="statFollowing"><div class="stat-num" id="followingCount">0</div><div class="stat-label">seguindo</div></div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:20px" id="actionBtns"></div>

  <!-- TABS -->
  <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:16px">
    <button class="btn-ghost" id="tabPosts" style="flex:1;border-bottom:2px solid var(--accent);border-radius:0;color:var(--accent)">Vibes</button>
    <button class="btn-ghost" id="tabLikes" style="flex:1;border-bottom:2px solid transparent;border-radius:0">Vibradas</button>
  </div>

  <div class="profile-grid" id="postsGrid"></div>
  <div class="profile-grid" id="likesGrid" style="display:none"></div>
</div>

<nav class="bottom-nav">
  <a href="feed.html">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Onda
  </a>
  <a href="buscar.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    Explorar
  </a>
  <a href="mensagens.html">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    Papo
  </a>
  <a href="notificacoes.html">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    Sinais
  </a>
  <a href="perfil.html" class="active">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    Presença
  </a>
</nav>

<div id="toast-container"></div>

<script type="module">
import { auth, db } from "./js/config.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import {
  ref, get, set, remove, onValue, query, orderByChild
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
import { uploadFile, uniquePath } from "./js/storage.js";
import {
  validateBio, validateEmoji, validateFileUpload, sanitizeText
} from "./js/validation.js";
import { rateLimiter } from "./js/rateLimiter.js";
import {
  getBlockedUsers, blockUser, unblockUser, denunciar,
  abrirModalDenuncia, abrirMenuContexto
} from "./js/moderation.js";

const params = new URLSearchParams(location.search);
let profileUid = params.get('uid');
let currentUser = null;
let isMyProfile = false;

function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

onAuthStateChanged(auth, async user => {
  if (!user || !user.emailVerified) return window.location.href = 'index.html';
  currentUser = user;
  if (!profileUid) profileUid = user.uid;
  isMyProfile = profileUid === user.uid;
  document.getElementById('app').style.display = '';
  loadProfile();
  loadPosts();
  loadLikedPosts();
  setupTopbarMenu();
});

function setupTopbarMenu() {
  const btn = document.getElementById('btnMenu');
  if (!btn) return;
  btn.onclick = async (e) => {
    e.stopPropagation();
    if (isMyProfile) {
      // Menu próprio: editar / sair
      abrirMenuContexto(btn, [
        { label: 'Editar presença', icon: '✏️', onClick: () => document.getElementById('editModal').classList.remove('hidden') },
        { label: 'Sair', icon: '🚪', danger: true, onClick: async () => { await signOut(auth); window.location.href = 'index.html'; } }
      ]);
    } else {
      // Menu alvo: denunciar / bloquear ou desbloquear
      const blocked = await getBlockedUsers(currentUser.uid);
      const isBlocked = !!blocked[profileUid];
      abrirMenuContexto(btn, [
        { label: 'Denunciar usuário', icon: '🚩', onClick: denunciarPerfil },
        isBlocked
          ? { label: 'Desbloquear', icon: '✅', onClick: desbloquearPerfil }
          : { label: 'Bloquear', icon: '🚫', danger: true, onClick: bloquearPerfil }
      ]);
    }
  };
}

async function denunciarPerfil() {
  const snap = await get(ref(db, 'usuarios/' + profileUid));
  const uname = (snap.val() || {}).username || 'esse usuário';
  const res = await abrirModalDenuncia(`@${uname}`);
  if (!res) return;
  try {
    await denunciar(currentUser.uid, 'usuario', profileUid, res.motivoId, res.descricao);
    toast('Denúncia enviada. Obrigado!', 'success');
  } catch (e) {
    console.error(e);
    toast('Erro ao enviar denúncia', 'error');
  }
}

async function bloquearPerfil() {
  const snap = await get(ref(db, 'usuarios/' + profileUid));
  const uname = (snap.val() || {}).username || 'usuário';
  if (!confirm(`Bloquear @${uname}?\n\nVocê não verá mais posts, mensagens ou comentários dessa pessoa.`)) return;
  try {
    await blockUser(currentUser.uid, profileUid);
    toast(`@${uname} bloqueado`, 'success');
    loadProfile(); // re-render pra atualizar botões
  } catch (e) {
    console.error(e);
    toast('Erro ao bloquear', 'error');
  }
}

async function desbloquearPerfil() {
  const snap = await get(ref(db, 'usuarios/' + profileUid));
  const uname = (snap.val() || {}).username || 'usuário';
  try {
    await unblockUser(currentUser.uid, profileUid);
    toast(`@${uname} desbloqueado`, 'success');
    loadProfile();
  } catch (e) {
    console.error(e);
    toast('Erro ao desbloquear', 'error');
  }
}

async function loadProfile() {
  const snap = await get(ref(db, 'usuarios/' + profileUid));
  const u = snap.val() || {};

  document.getElementById('topbarUsername').textContent = u.username || '';
  document.getElementById('profileName').textContent = `${u.emoji || '👤'} ${u.username || ''}`;
  document.getElementById('profileBio').textContent = u.bio || '';

  // Redes sociais
  const existingSocial = document.getElementById('socialLinksRow');
  if (existingSocial) existingSocial.remove();
  const redes = u.redes || {};
  const redesDef = [
    { key: 'instagram', icon: '📸', name: 'Instagram', color: '#E1306C', url: h => `https://instagram.com/${h}` },
    { key: 'x',         icon: '𝕏',  name: 'X',         color: '#000',    url: h => `https://x.com/${h}` },
    { key: 'tiktok',    icon: '🎵', name: 'TikTok',    color: '#010101', url: h => `https://tiktok.com/@${h}` },
    { key: 'youtube',   icon: '▶️', name: 'YouTube',   color: '#FF0000', url: h => h.startsWith('http') ? h : `https://youtube.com/@${h}` }
  ];
  const activeRedes = redesDef.filter(r => redes[r.key]);
  if (activeRedes.length > 0) {
    const row = document.createElement('div');
    row.id = 'socialLinksRow';
    row.className = 'social-links-row';
    activeRedes.forEach(r => {
      const a = document.createElement('a');
      a.className = 'social-link-badge';
      a.style.background = r.color;
      a.href = r.url(redes[r.key].replace('@', ''));
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = `${r.icon} ${redes[r.key]}`;
      row.appendChild(a);
    });
    document.getElementById('profileBio').after(row);
  }

  const avatarEl = document.getElementById('profileAvatar');
  if (u.fotoPerfil) {
    avatarEl.innerHTML = `<img class="avatar" src="${u.fotoPerfil}" style="width:80px;height:80px"/>`;
  } else {
    avatarEl.innerHTML = `<div class="avatar-placeholder" style="width:80px;height:80px;font-size:32px;border:none">${u.emoji || '👤'}</div>`;
  }

  // Edit avatar preview
  const editPreview = document.getElementById('editAvatarPreview');
  if (u.fotoPerfil) {
    editPreview.innerHTML = `<img src="${u.fotoPerfil}" style="width:80px;height:80px;border-radius:50%;object-fit:cover"/>`;
  } else {
    editPreview.innerHTML = `<div class="avatar-placeholder" style="width:80px;height:80px;font-size:32px;border:none">${u.emoji || '👤'}</div>`;
  }

  document.getElementById('editEmoji').value = u.emoji || '';
  document.getElementById('editBio').value = u.bio || '';
  const r = u.redes || {};
  document.getElementById('editInstagram').value = r.instagram || '';
  document.getElementById('editX').value = r.x || '';
  document.getElementById('editTiktok').value = r.tiktok || '';
  document.getElementById('editYoutube').value = r.youtube || '';

  // Stats
  const followerSnap = await get(ref(db, `usuarios/${profileUid}/seguidores`));
  const followingSnap = await get(ref(db, `usuarios/${profileUid}/seguindo`));
  const postSnap = await get(query(ref(db, 'posts'), orderByChild('uid')));
  let postCount = 0;
  postSnap.forEach(c => { if (c.val().uid === profileUid) postCount++; });

  document.getElementById('followerCount').textContent = followerSnap.exists() ? Object.keys(followerSnap.val()).length : 0;
  document.getElementById('followingCount').textContent = followingSnap.exists() ? Object.keys(followingSnap.val()).length : 0;
  document.getElementById('postCount').textContent = postCount;

  // Action buttons
  const btns = document.getElementById('actionBtns');
  btns.innerHTML = '';
  if (isMyProfile) {
    btns.innerHTML = `
      <button class="btn btn-outline" id="btnEdit" style="flex:1">Editar presença</button>
      <button class="btn btn-danger" id="btnLogout" style="flex:0">Sair</button>`;
    document.getElementById('btnEdit').onclick = () => document.getElementById('editModal').classList.remove('hidden');
    document.getElementById('btnLogout').onclick = async () => { await signOut(auth); window.location.href = 'index.html'; };
  } else {
    // Verifica se o currentUser bloqueou este perfil
    const blocked = await getBlockedUsers(currentUser.uid);
    const isBlocked = !!blocked[profileUid];

    if (isBlocked) {
      const unblockBtn = document.createElement('button');
      unblockBtn.className = 'btn btn-outline';
      unblockBtn.style.flex = '1';
      unblockBtn.innerHTML = '🚫 Bloqueado — desbloquear';
      unblockBtn.onclick = desbloquearPerfil;
      btns.appendChild(unblockBtn);
    } else {
      const isFollowing = (await get(ref(db, `usuarios/${profileUid}/seguidores/${currentUser.uid}`))).exists();
      const followBtn = document.createElement('button');
      followBtn.className = `btn ${isFollowing ? 'btn-outline' : 'btn-primary'}`;
      followBtn.style.flex = '1';
      followBtn.textContent = isFollowing ? 'Sintonizado' : 'Sintonizar';
      followBtn.onclick = () => toggleFollow(followBtn, isFollowing);
      btns.appendChild(followBtn);

      const chatBtn = document.createElement('button');
      chatBtn.className = 'btn btn-outline';
      chatBtn.textContent = '💬 Mensagem';
      chatBtn.onclick = () => {
        window.location.href = `chat.html?tipo=privado&outroUid=${profileUid}`;
      };
      btns.appendChild(chatBtn);
    }
  }
}

async function toggleFollow(btn, wasFollowing) {
  const followerRef = ref(db, `usuarios/${profileUid}/seguidores/${currentUser.uid}`);
  const followingRef = ref(db, `usuarios/${currentUser.uid}/seguindo/${profileUid}`);
  if (wasFollowing) {
    await remove(followerRef);
    await remove(followingRef);
    btn.className = 'btn btn-primary';
    btn.textContent = 'Sintonizar';
    const count = parseInt(document.getElementById('followerCount').textContent) - 1;
    document.getElementById('followerCount').textContent = count;
  } else {
    await set(followerRef, true);
    await set(followingRef, true);
    btn.className = 'btn btn-outline';
    btn.textContent = 'Sintonizado';
    const count = parseInt(document.getElementById('followerCount').textContent) + 1;
    document.getElementById('followerCount').textContent = count;
    // Notify
    const { push } = await import("https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js");
    push(ref(db, `notificacoes/${profileUid}`), {
      tipo: 'seguiu',
      de: currentUser.uid,
      timestamp: Date.now(),
      lida: false
    });
  }
}

function loadPosts() {
  const grid = document.getElementById('postsGrid');
  onValue(query(ref(db, 'posts'), orderByChild('timestamp')), snap => {
    grid.innerHTML = '';
    const posts = [];
    snap.forEach(c => { if (c.val().uid === profileUid) posts.unshift({ id: c.key, ...c.val() }); });
    if (posts.length === 0) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📷</div><p>Sem Vibes ainda</p></div>';
      return;
    }
    posts.forEach(p => {
      const tipo = p.tipo || (p.videoUrl ? 'video' : (p.imagemUrl ? 'foto' : 'texto'));
      const item = document.createElement('div');
      item.className = 'profile-grid-item';
      item.style.position = 'relative';

      if (tipo === 'foto') {
        const img = document.createElement('img');
        img.src = p.imagemUrl;
        img.loading = 'lazy';
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
        item.appendChild(img);
        item.onclick = () => {
          document.getElementById('imgModalSrc').src = p.imagemUrl;
          document.getElementById('imgModal').classList.remove('hidden');
        };
      } else if (tipo === 'video') {
        const img = document.createElement('img');
        img.src = p.imagemPequena || p.videoUrl;
        img.loading = 'lazy';
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
        item.appendChild(img);
        const badge = document.createElement('div');
        badge.style.cssText = 'position:absolute;top:6px;right:6px;color:#fff;font-size:18px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.8))';
        badge.textContent = '▶';
        item.appendChild(badge);
        item.onclick = () => window.location.href = 'feed.html';
      } else {
        // Texto
        item.style.cssText += ';background:var(--bg2);display:flex;align-items:center;justify-content:center;padding:8px;overflow:hidden';
        const txt = document.createElement('div');
        txt.style.cssText = 'font-size:11px;color:var(--text1);text-align:center;line-height:1.3;word-break:break-word;overflow:hidden;max-height:100%';
        txt.textContent = (p.texto || '').slice(0, 60);
        item.appendChild(txt);
        item.onclick = () => window.location.href = 'feed.html';
      }

      grid.appendChild(item);
    });
  });
}

async function loadLikedPosts() {
  const grid = document.getElementById('likesGrid');
  const snap = await get(ref(db, 'posts'));
  grid.innerHTML = '';
  const liked = [];
  snap.forEach(c => {
    const p = c.val();
    if (p.curtidas && p.curtidas[profileUid]) liked.unshift({ id: c.key, ...p });
  });
  if (liked.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🤍</div><p>Nenhuma vibração ainda</p></div>';
    return;
  }
  liked.forEach(p => {
    const tipo = p.tipo || (p.videoUrl ? 'video' : (p.imagemUrl ? 'foto' : 'texto'));
    const item = document.createElement('div');
    item.className = 'profile-grid-item';
    item.style.position = 'relative';

    if (tipo === 'foto') {
      const img = document.createElement('img');
      img.src = p.imagemUrl;
      img.loading = 'lazy';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
      item.appendChild(img);
      item.onclick = () => {
        document.getElementById('imgModalSrc').src = p.imagemUrl;
        document.getElementById('imgModal').classList.remove('hidden');
      };
    } else if (tipo === 'video') {
      const img = document.createElement('img');
      img.src = p.imagemPequena || p.videoUrl;
      img.loading = 'lazy';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
      item.appendChild(img);
      const badge = document.createElement('div');
      badge.style.cssText = 'position:absolute;top:6px;right:6px;color:#fff;font-size:18px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.8))';
      badge.textContent = '▶';
      item.appendChild(badge);
      item.onclick = () => window.location.href = 'feed.html';
    } else {
      item.style.cssText += ';background:var(--bg2);display:flex;align-items:center;justify-content:center;padding:8px;overflow:hidden';
      const txt = document.createElement('div');
      txt.style.cssText = 'font-size:11px;color:var(--text1);text-align:center;line-height:1.3;word-break:break-word;overflow:hidden;max-height:100%';
      txt.textContent = (p.texto || '').slice(0, 60);
      item.appendChild(txt);
      item.onclick = () => window.location.href = 'feed.html';
    }

    grid.appendChild(item);
  });
}

// Tabs
document.getElementById('tabPosts').onclick = () => {
  document.getElementById('postsGrid').style.display = '';
  document.getElementById('likesGrid').style.display = 'none';
  document.getElementById('tabPosts').style.borderBottomColor = 'var(--accent)';
  document.getElementById('tabPosts').style.color = 'var(--accent)';
  document.getElementById('tabLikes').style.borderBottomColor = 'transparent';
  document.getElementById('tabLikes').style.color = '';
};
document.getElementById('tabLikes').onclick = () => {
  document.getElementById('postsGrid').style.display = 'none';
  document.getElementById('likesGrid').style.display = '';
  document.getElementById('tabLikes').style.borderBottomColor = 'var(--accent)';
  document.getElementById('tabLikes').style.color = 'var(--accent)';
  document.getElementById('tabPosts').style.borderBottomColor = 'transparent';
  document.getElementById('tabPosts').style.color = '';
};

// Edit
document.getElementById('closeEdit').onclick = () => document.getElementById('editModal').classList.add('hidden');
document.getElementById('btnChangePhoto').onclick = () => document.getElementById('photoInput').click();

let newPhotoFile = null;
document.getElementById('photoInput').onchange = (e) => {
  newPhotoFile = e.target.files[0];
  if (!newPhotoFile) return;

  // Validar arquivo de foto
  const fileError = validateFileUpload(newPhotoFile, {
    maxSize: 5 * 1024 * 1024, // 5MB
    allowedTypes: ['image/jpeg', 'image/png', 'image/gif', 'image/webp']
  });

  if (fileError) {
    toast(fileError, 'error');
    newPhotoFile = null;
    return;
  }

  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.createElement('img');
    img.src = ev.target.result;
    img.style.width = '80px';
    img.style.height = '80px';
    img.style.borderRadius = '50%';
    img.style.objectFit = 'cover';

    const preview = document.getElementById('editAvatarPreview');
    preview.innerHTML = '';
    preview.appendChild(img);
  };
  reader.onerror = () => {
    toast('Erro ao ler arquivo', 'error');
    newPhotoFile = null;
  };
  reader.readAsDataURL(newPhotoFile);
};

document.getElementById('btnSaveEdit').onclick = async () => {
  let emoji = document.getElementById('editEmoji').value.trim();
  const bio = document.getElementById('editBio').value.trim();

  // Se emoji não foi alterado, obter o atual
  if (!emoji) {
    const current = (await get(ref(db, 'usuarios/' + currentUser.uid))).val() || {};
    emoji = current.emoji || '👤';
  }

  // Validar emoji
  const emojiError = validateEmoji(emoji);
  if (emojiError) return toast(emojiError, 'error');

  // Validar bio
  const bioError = validateBio(bio);
  if (bioError) return toast(bioError, 'error');

  // Rate limiting para edição de bio
  const rateLimitCheck = rateLimiter.checkLimit(currentUser.uid, 'bio');
  if (!rateLimitCheck.allowed) {
    return toast(rateLimitCheck.message, 'error');
  }
  let fotoPerfil = null;

  if (newPhotoFile) {
    // Rate limiting para mudança de foto
    const photoLimitCheck = rateLimiter.checkLimit(currentUser.uid, 'pfp');
    if (!photoLimitCheck.allowed) {
      return toast(photoLimitCheck.message, 'error');
    }

    try {
      const path = uniquePath(`perfis/${currentUser.uid}`, newPhotoFile.name);
      fotoPerfil = await uploadFile(newPhotoFile, path, {
        maxSize: 5 * 1024 * 1024,
        allowedTypes: ['image/jpeg', 'image/png', 'image/gif', 'image/webp']
      });
    } catch (e) {
      return toast('Erro ao enviar foto: ' + e.message, 'error');
    }
  }

  // Coletar redes sociais
  const redes = {};
  const ig = document.getElementById('editInstagram').value.trim().replace('@', '');
  const xh = document.getElementById('editX').value.trim().replace('@', '');
  const tt = document.getElementById('editTiktok').value.trim().replace('@', '');
  const yt = document.getElementById('editYoutube').value.trim();
  if (ig) redes.instagram = ig;
  if (xh) redes.x = xh;
  if (tt) redes.tiktok = tt;
  if (yt) redes.youtube = yt.replace('@', '');

  const current = (await get(ref(db, 'usuarios/' + currentUser.uid))).val() || {};
  const updates = { ...current, emoji, bio, redes };
  if (fotoPerfil) updates.fotoPerfil = fotoPerfil;
  await set(ref(db, 'usuarios/' + currentUser.uid), updates);

  toast('Presença atualizada!', 'success');
  document.getElementById('editModal').classList.add('hidden');
  loadProfile();
};

// Image modal
document.getElementById('closeImgModal').onclick = () => document.getElementById('imgModal').classList.add('hidden');

// Menu
document.getElementById('btnMenu').onclick = () => {
  if (isMyProfile) {
    document.getElementById('editModal').classList.remove('hidden');
  }
};
</script>
